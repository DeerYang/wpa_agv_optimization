<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGV调度优化 · 指挥中心</title>
  <meta name="description" content="基于狼群算法的多AGV任务分配与路径规划可视化系统" />
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <div class="header-left">
      <svg class="logo-icon" width="22" height="22" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="24" height="24" rx="6" stroke="url(#g1)" stroke-width="2.5"/>
        <circle cx="9" cy="14" r="3" fill="url(#g1)"/>
        <circle cx="19" cy="14" r="3" fill="url(#g1)"/>
        <path d="M12 14H16" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
        <defs><linearGradient id="g1" x1="0" y1="0" x2="28" y2="28"><stop stop-color="var(--accent-cyan)"/><stop offset="1" stop-color="var(--accent-purple)"/></linearGradient></defs>
      </svg>
      <span class="header-title">AGV调度优化</span>
      <span class="header-divider">/</span>
      <span class="header-sub">指挥中心</span>
    </div>
    <div class="header-right">
      <div id="algorithm-buttons" class="algorithm-buttons" aria-label="选择对比算法"></div>
      <div class="hud-select">
        <select id="sample-select" aria-label="选择数据来源">
          <option value="latest" selected>最后运行结果</option>
          <option value="1">示例场景 1</option>
          <option value="2">示例场景 2</option>
          <option value="3">示例场景 3</option>
        </select>
      </div>

      <span id="scenario-badge" class="hud-badge hidden"></span>
    </div>
  </header>

  <!-- Main Grid -->
  <div id="app-grid">
    <!-- Left HUD -->
    <aside id="left-hud" class="hud-panel">
      <div class="hud-section">
        <div class="hud-section-title">方案指标</div>
        <div class="kpi-grid">
          <div class="kpi-cell">
            <div class="kpi-num gradient" id="m-F">—</div>
            <div class="kpi-name">适应度 F</div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-num" id="m-N">—</div>
            <div class="kpi-name">车辆数 N</div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-num" id="m-D">—</div>
            <div class="kpi-name">总距离 D</div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-num" id="m-T">—</div>
            <div class="kpi-name">时间罚 T</div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-num" id="m-conflict">—</div>
            <div class="kpi-name">冲突数</div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-num" id="m-replan">—</div>
            <div class="kpi-name">重规划</div>
          </div>
        </div>
      </div>

      <div class="hud-divider"></div>

      <div class="hud-section compact">
        <div class="hud-section-title">运行信息</div>
        <div class="info-rows">
          <div class="info-row"><span class="info-label">场景</span><span class="info-value" id="run-scenario">—</span></div>
          <div class="info-row"><span class="info-label">算法</span><span class="info-value" id="run-algorithm">—</span></div>
          <div class="info-row"><span class="info-label">种子</span><span class="info-value" id="run-seed">—</span></div>
          <div class="info-row"><span class="info-label">来源</span><span class="info-value" id="run-source">—</span></div>
        </div>
      </div>

      <div class="hud-divider"></div>

      <div class="hud-section compact">
        <div class="hud-section-title">实时摘要</div>
        <div class="live-grid">
          <div class="live-cell"><span class="live-num" id="m-total-tasks">—</span><span class="live-name">任务</span></div>
          <div class="live-cell"><span class="live-num" id="m-completion-rate">—</span><span class="live-name">完成率</span></div>
          <div class="live-cell"><span class="live-num" id="m-active-agv">—</span><span class="live-name">活跃</span></div>
          <div class="live-cell"><span class="live-num" id="m-finished-agv">—</span><span class="live-name">已结束</span></div>
        </div>
      </div>

      <div class="hud-divider"></div>

      <div class="hud-section chart-section">
        <div class="hud-section-title">收敛曲线</div>
        <canvas id="chart-canvas"></canvas>
        <div class="chart-caption" id="chart-caption">最优值 —</div>
      </div>
    </aside>

    <!-- Map Stage -->
    <main id="map-stage">
      <canvas id="map-canvas"></canvas>
      <div id="map-tooltip" class="tooltip hidden"></div>
    </main>

    <!-- Right HUD -->
    <aside id="right-hud" class="hud-panel">
      <div class="hud-tabs">
        <button class="hud-tab active" data-tab="agv">AGV 列表</button>
        <button class="hud-tab" data-tab="events">事件流</button>
      </div>

      <div class="tab-body" id="tab-agv">
        <div id="agv-list" class="agv-list">
          <div class="empty-hint">请先加载数据</div>
        </div>
      </div>

      <div class="tab-body hidden" id="tab-events">
        <div id="event-list" class="event-list">
          <div class="empty-hint">请先加载数据</div>
        </div>
      </div>
    </aside>

    <!-- Bottom HUD -->
    <div id="bottom-hud" class="hud-panel">
      <div class="ctrl-left">
        <button id="btn-step-back" class="ctrl-icon" title="后退 (←)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 20L9 12l10-8v16z"/><path d="M5 19V5"/></svg>
        </button>
        <button id="btn-play" class="ctrl-play" title="播放/暂停 (空格)">
          <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="btn-step-fwd" class="ctrl-icon" title="前进 (→)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 4l10 8-10 8V4z"/><path d="M19 5v14"/></svg>
        </button>
        <button id="btn-reset" class="ctrl-icon" title="重置 (Home)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>

      <div class="ctrl-center">
        <span class="time-code" id="time-display">t = 0</span>
        <div class="track-wrap">
          <input type="range" id="progress-bar" min="0" max="100" value="0" aria-label="时间步进度" />
        </div>
        <span class="time-code dim" id="time-max">/ 0</span>
      </div>

      <div class="ctrl-right">
        <select id="speed-select" class="speed-select" aria-label="播放速度">
          <option value="2000">0.5x</option>
          <option value="1000" selected>1x</option>
          <option value="500">2x</option>
          <option value="250">4x</option>
          <option value="100">10x</option>
        </select>
        <div class="view-toggles">
          <label class="hud-check" title="任务编号"><input type="checkbox" id="toggle-task-labels" checked /><span>编号</span></label>
          <label class="hud-check" title="历史轨迹"><input type="checkbox" id="toggle-trails" checked /><span>轨迹</span></label>
          <label class="hud-check" title="仅显示焦点"><input type="checkbox" id="toggle-isolate-focus" /><span>焦点</span></label>
        </div>
        <button id="btn-clear-focus" class="ctrl-ghost">清除焦点</button>
        <span id="focus-badge" class="focus-pill">全部 AGV</span>
      </div>
    </div>
  </div>

  <script src="analysis.js"></script>
  <script src="data-sources.js"></script>
  <script src="app.js"></script>
</body>
</html>
